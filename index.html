        .sidebar {

            display: flex;
            flex-direction: column;
            justify-content: flex-start;

            box-sizing: border-box;
            position: fixed;

            top: 0;

            margin-bottom: 20px;
            color: #ecf0f1;
        }

        .home-button, .accordion, .video-button {

            padding: 12px;
            margin-bottom: 10px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;

        .home-button:hover, .accordion:hover, .video-button:hover {
            background-color: #2980b9;
        }

        .accordion.active {
            background-color: #1abc9c;
        }

        .panel {
            display: none;
            padding: 10px;
            background-color: #34495e;
            border-radius: 5px;
            margin-top: -10px;
        }

        .panel .video-button {
            background-color: #16a085;
            margin-bottom: 5px;
        }

        .panel .video-button:hover {
            background-color: #0e6655;
        }

        .content {
            margin-left: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ecf0f1;
            width: calc(100% - 300px);
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .video-container {
            background-color: #fff;
            width: 800px;
            height: 460px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            resize: both;
            overflow: hidden;

            height: 100%;
            border-radius: 10px;

<script>
    function playVideo(videoUrl) {
        var videoContainer = document.getElementById('videoContainer');
        var videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.src = videoUrl;
        videoContainer.style.display = 'block';
    }

    var acc = document.getElementsByClassName("accordion");
    for (var i = 0; i < acc.length; i++) {
        acc[i].addEventListener("click", function() {
            this.classList.toggle("active");
            var panel = this.nextElementSibling;
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        });
    }

    function filterVideos() {
        var input = document.getElementById('searchInput');
        var filter = input.value.toLowerCase();
        var videoButtons = document.querySelectorAll('.video-button');

        videoButtons.forEach(function(button) {
            var text = button.textContent || button.innerText;
            button.style.display = text.toLowerCase().indexOf(filter) > -1 ? '' : 'none';
        });
    }
</script>
